name: build

on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define as duas versões solicitadas
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Se houver um arquivo de requisitos:
        # pip install -r requirements.txt 

    - name: Analisar código com flake8 (Linter)
      run: |
        # Para se houver erros de sintaxe ou nomes indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisos de estilo (opcional: pode ser configurado para não falhar o build)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Executar testes com unittest
      run: |
        python -m unittest -v